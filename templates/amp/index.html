<style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-moz-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-ms-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-o-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style>

<style amp-custom>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:#FONT_FAMILY,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:radial-gradient(circle at center,#BODY_BG2 0%,#BODY_BG 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px 0}
.container{width:100%;max-width:420px;margin:0 auto;padding:24px;background:linear-gradient(135deg,#CARD_BG 0%,#CARD_BG2 100%);border-radius:24px;border:2px solid #BORDER_COLOR;box-shadow:0 25px 60px rgba(0,0,0,.85);text-align:center}
header{width:100%;margin-bottom:16px}
header a{display:inline-block}
.logo-img{max-width:100%;height:auto;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.welcome{width:100%;margin-bottom:12px}
.welcome h1{font-size:14px;color:#TEXT_COLOR;font-weight:600;text-transform:uppercase;letter-spacing:.8px;line-height:1.5}
.welcome h1 span{color:#ACCENT;font-weight:700}
.tagline{font-size:12px;color:#TEXT_COLOR;opacity:.85;margin-bottom:12px;line-height:1.4}
.ticker-wrap{overflow:hidden;width:100%;margin-bottom:14px;border-radius:8px;background:rgba(0,0,0,.25);padding:8px 0}
.ticker{display:inline-block;white-space:nowrap;font-size:11px;color:#ACCENT;animation:marquee 18s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.promo-desc{font-size:13px;color:#TEXT_COLOR;line-height:1.5;margin-bottom:14px;padding:0 4px}
.banner{border-radius:16px;border:1px solid rgba(255,255,255,.15);box-shadow:0 12px 30px rgba(0,0,0,.8);margin-bottom:20px}
.action-group{display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.btn-3d{display:block;width:100%;min-height:54px;line-height:54px;color:#BTN_TEXT;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;text-decoration:none;border-radius:12px;background:linear-gradient(180deg,#fff 0%,#e2e8f0 40%,#adb9c7 50%,#cbd5e1 100%);border:none;box-sizing:border-box}
.btn-3d.primary{background:linear-gradient(180deg,#fff3db 0%,#ACCENT 40%,#ACCENT_DARK 50%,#ACCENT 100%);color:#1e1508}
.copyright{font-size:12px;color:rgba(156,169,184,.6);letter-spacing:.5px;border-top:1px solid rgba(156,169,184,.15);padding-top:14px;line-height:1.6}
.copyright a{color:#TEXT_COLOR;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="container">
<header>
<a href="#LINKCANNO">
<amp-img class="logo-img" src="#LOGO" alt="#BRAND logo resmi" width="#LOGO_W" height="#LOGO_H" layout="intrinsic"></amp-img>
</a>
</header>
<div class="welcome">
<h1><span>#BRAND</span> #H1_TAIL</h1>
</div>
<p class="tagline">#TAGLINE</p>
#TICKER
<p class="promo-desc">#PROMO</p>
<amp-img src="#BANNER" width="#BANNER_W" height="#BANNER_H" layout="responsive" class="banner" alt="#BANNER_ALT"></amp-img>
<div class="action-group">
<a href="#LINKREFF" target="_blank" rel="noopener noreferrer" class="btn-3d primary">LOGIN #BRAND</a>
<a href="#LINKREFF" target="_blank" rel="noopener noreferrer" class="btn-3d">DAFTAR #BRAND</a>
</div>
<p class="copyright">&copy; #YEAR <a href="#LINKCANNO">#BRAND</a> · #FOOTER_TAGLINE</p>
</div>
</body>
